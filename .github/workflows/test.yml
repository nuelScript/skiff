name: test

# Vet and test on every push to main and every pull request. The dashboard is
# already embedded (internal/panel/dist is committed), so no Node build is needed
# to compile the Go packages.

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l . | grep -v '^\.agents/' || true)
          if [ -n "$out" ]; then echo "gofmt needed:"; echo "$out"; exit 1; fi

      - run: go vet ./...

      - run: go test ./...
