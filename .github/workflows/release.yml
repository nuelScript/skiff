name: release

# Push a version tag to build the dashboard into the binary, cross-compile the
# Linux binaries, and publish them to a GitHub Release. The installer at
# useskiff.xyz/install downloads the latest release's binary.
#
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build dashboard into the binary
        working-directory: web/dash
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          npm run build
          rm -rf ../../internal/panel/dist
          cp -r dist ../../internal/panel/dist

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Cross-compile binaries
        env:
          CGO_ENABLED: "0"
        run: |
          LDFLAGS="-s -w -X 'github.com/nuelScript/skiff/cmd.buildVersion=${{ github.ref_name }}'"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            echo "→ building skiff-$os-$arch"
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="$LDFLAGS" -o "skiff-$os-$arch" .
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            skiff-linux-amd64 skiff-linux-arm64 skiff-darwin-amd64 skiff-darwin-arm64 \
            --title "${{ github.ref_name }}" \
            --generate-notes

      # Update the Homebrew tap (nuelScript/homebrew-tap) with the new version and
      # checksums. Skipped unless a HOMEBREW_TAP_TOKEN secret (a PAT with write
      # access to the tap) is configured.
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew formula update."
            exit 0
          fi
          tag="${{ github.ref_name }}"; ver="${tag#v}"
          sha() { sha256sum "$1" | cut -d' ' -f1; }
          git clone "https://x-access-token:$TAP_TOKEN@github.com/nuelScript/homebrew-tap.git" tap
          mkdir -p tap/Formula
          sed -e "s/__VERSION__/$ver/" -e "s/__TAG__/$tag/g" \
              -e "s/__SHA_DARWIN_ARM64__/$(sha skiff-darwin-arm64)/" \
              -e "s/__SHA_DARWIN_AMD64__/$(sha skiff-darwin-amd64)/" \
              -e "s/__SHA_LINUX_ARM64__/$(sha skiff-linux-arm64)/" \
              -e "s/__SHA_LINUX_AMD64__/$(sha skiff-linux-amd64)/" \
              .github/homebrew/skiff.rb.tmpl > tap/Formula/skiff.rb
          cd tap
          git config user.name "Parseval"
          git config user.email "igwee3333@gmail.com"
          git add Formula/skiff.rb
          git commit -m "skiff $tag" || { echo "no formula change"; exit 0; }
          git push
