name: Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please **do not** report
        security vulnerabilities here — see
        [SECURITY.md](https://github.com/nuelScript/skiff/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I run `skiff deploy`, …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands / steps, ideally with a minimal example app.
      placeholder: |
        1. `skiff init`
        2. `skiff deploy`
        3. …
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      description: Paste any error output. This is automatically formatted as code.
      render: shell
  - type: input
    id: version
    attributes:
      label: Skiff version
      description: Output of `skiff --version`.
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Deploy target
      options:
        - Local Docker
        - Remote (SSH)
        - Not sure
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS & Docker version
      placeholder: "macOS 14 / Docker 27.0"
    validations:
      required: true
